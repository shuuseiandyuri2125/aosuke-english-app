<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7f8f2">
  <title>蒼佑くんの英単語</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">聞いて、見て、少しずつ</p>
        <h1>蒼佑くんの英単語</h1>
      </div>
      <div class="score-box" aria-live="polite">
        <span id="todayCount">0</span>
        <small>今日の練習</small>
      </div>
    </header>

    <main>
      <section class="setup" aria-label="練習設定">
        <div class="control">
          <span class="control-label">学年</span>
          <div class="segmented" id="gradeTabs" role="tablist" aria-label="学年を選ぶ">
            <button class="is-active" type="button" data-grade="1">中1</button>
            <button type="button" data-grade="2">中2</button>
            <button type="button" data-grade="3">中3</button>
          </div>
        </div>

        <div class="control">
          <label class="control-label" for="unitSelect">セット</label>
          <select id="unitSelect"></select>
        </div>

        <div class="control">
          <span class="control-label">1回</span>
          <div class="segmented" id="sizeTabs" aria-label="1回の単語数">
            <button class="is-active" type="button" data-size="5">5語</button>
            <button type="button" data-size="10">10語</button>
          </div>
        </div>
      </section>

      <nav class="mode-tabs" aria-label="練習モード">
        <button class="is-active" type="button" data-mode="learn">見る</button>
        <button type="button" data-mode="quiz">意味</button>
        <button type="button" data-mode="spell">スペル</button>
      </nav>

      <section class="practice-area" id="practiceArea" aria-live="polite"></section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
